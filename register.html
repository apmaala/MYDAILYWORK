<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | QuizMaker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">Q</span>
                <span class="logo-text">QuizMaker</span>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="#" class="nav-link">Features</a>
                <a href="#" class="nav-link">About</a>
                <a href="login.html" class="nav-link btn-secondary small">Log In</a>
                <a href="register.html" class="nav-link btn-primary small" style="padding: 0.5rem 1.25rem;">Sign Up</a>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card fade-in-up">
            <div class="auth-header">
                <h2>Create an Account</h2>
                <p>Join QuizMaker and start building</p>
            </div>
            <form class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Jane Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary ripple">Sign Up Free</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Log In</a></p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>

</html>
